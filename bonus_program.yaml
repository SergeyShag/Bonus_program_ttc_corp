# ============================================================
# ПРОГРАММА ПРЕМИРОВАНИЯ — B2B И ГСФ
# Версия: 1.2 (май 2026)
# Документ: СЛЗ 154168 от 31.03.2026
# ============================================================
#
# Логика весов КПЭ Типа 1:
#   Веса нормированы к БРП (base_bonus_rate), а не к 1.0.
#   Сумма весов всех КПЭ Типа 1 в карточке должности = base_bonus_rate.
#   Формула выплаты по одному КПЭ Типа 1:
#     payout = оклад × вес × коэффициент_шкалы
#   (БРП в формулу не входит — он уже зашит в веса.)
#
# Шкала-корректор для КПЭ Типа 2 работает как условие допуска:
#   коэффициент = 0 → сдельная по этому КПЭ не начисляется;
#   коэффициент > 0 → начисляется в полном размере по rate_formula.
#
# Условие выплаты для КПЭ Типа 3: 100% оплата начислений клиентом.
# ============================================================


# ============================================================
# СПРАВОЧНИК 1. ШКАЛЫ-КОРРЕКТОРЫ
# ============================================================

scales:
  scale_1:
    description: Прирост регулярного дохода (новые продажи)
    thresholds:
      - { from: 0,    to: 0.65, coefficient: 0.0 }
      - { from: 0.65, to: 0.85, coefficient: 0.5 }
      - { from: 0.85, to: 1.00, coefficient: 0.8 }
      - { from: 1.00, to: 1.05, coefficient: 1.0 }
      - { from: 1.05, to: null, coefficient: 1.1 }

  scale_2:
    description: Выполнение плана по ежемесячным начислениям
    thresholds:
      - { from: 0,    to: 0.95, coefficient: 0.0 }
      - { from: 0.95, to: 1.00, coefficient: 0.8 }
      - { from: 1.00, to: 1.05, coefficient: 1.0 }
      - { from: 1.05, to: null, coefficient: 1.1 }

  scale_3:
    description: Оборачиваемость дебиторской задолженности (КО)
    note: >
      Направление обратное: чем ниже КО, тем лучше.
      КО = сумма ДЗ / среднемесячные начисления.
    thresholds:
      - { from: 1.3,  to: null, coefficient: 0.0 }
      - { from: 1.1,  to: 1.3,  coefficient: 0.8 }
      - { from: 0.9,  to: 1.1,  coefficient: 1.0 }
      - { from: null, to: 0.9,  coefficient: 1.1 }

  scale_4:
    description: Поступившие оплаты (группа ДЗ)
    thresholds:
      - { from: 0,    to: 0.80, coefficient: 0.0 }
      - { from: 0.80, to: 1.00, coefficient: 0.8 }
      - { from: 1.00, to: 1.20, coefficient: 1.0 }
      - { from: 1.20, to: null, coefficient: 1.1 }


# ============================================================
# СПРАВОЧНИК 2. ПЕРЕЧНИ УСЛУГ
# ============================================================

service_lists:
  priority_services:
    description: Приоритетные услуги (повышенная ставка вознаграждения)
    items:
      - ВАТС (виртуальная АТС)
      - Wi-Fi для гостей
      - Видеомониторинг / Безопасный двор
      - IP-домофония

  standard_services:
    description: Основные услуги (все услуги связи, кроме приоритетных)
    items:
      - Интернет, VPN
      - Местная телефонная связь, SIP-телефония
      - SIP-trunk, Цифровые потоки Е1
      - Мобильная связь
      - Интерактивный мультимедийный сервис, Твой Выбор Бизнес
      - Предоставление в пользование цифровых каналов
      - Предоставление в пользование оптического кабеля
      - Предоставление в пользование кабельной канализации


# ============================================================
# СПРАВОЧНИК 3. ТИПЫ КПЭ
# ============================================================

kpi_types:
  type_1:
    name: Выполнение планового показателя
    basis: Оклад
    payout_formula: оклад × вес × коэффициент_шкалы

  type_2:
    name: Сдельная оплата от прироста регулярных начислений
    basis: Сумма прироста регулярных начислений по конкретной сделке
    payout_formula: ставка(S) × S
    note: >
      S — прирост регулярных начислений по конкретной сделке.
      Шкала-корректор используется как условие допуска.

  type_3:
    name: Сдельная оплата за разовые сделки
    basis: Единовременные начисления / фактическая наценка / маржа
    payout_formula: ставка(S) × S
    note: Условие выплаты — 100% оплата соответствующих начислений клиентом.


