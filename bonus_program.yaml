# ============================================================
# СПРАВОЧНИК 5. ОБЩИЕ БЛОКИ КПЭ (для повторного использования)
# ============================================================

kpi_blocks:

  # Стандартный блок Типа 2 — продажа услуг
  block_sales_t2: &block_sales_t2
    - id: kpi_t2_standard_existing
      kpi_ref: growth_standard_existing
      client_status: существующий
      services: standard_services
      rate_formula: "0.75 * 60000 / (60000 + S)"
      scale: scale_1
      scale_role: условие_допуска
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

    - id: kpi_t2_standard_new
      kpi_ref: growth_standard_new
      client_status: новый
      services: standard_services
      rate_formula: "1.05 * 60000 / (60000 + S)"
      scale: scale_1
      scale_role: условие_допуска
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

    - id: kpi_t2_priority
      kpi_ref: growth_priority
      client_status: новый и существующий
      services: priority_services
      rate_formula: "1.50 * 60000 / (60000 + S)"
      scale: scale_1
      scale_role: условие_допуска
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # Сдельный канал ОТМ/ГРАС (только для сопровождения)
  block_otm_gras: &block_otm_gras
    - id: kpi_t2_otm_gras
      kpi_ref: growth_otm_gras
      services: standard_services
      rate_formula: "0.35 * 60000 / (60000 + S)"
      scale: null
      scale_role: не применяется
      note: ОТМ — отдел телемаркетинга; ГРАС — группа развития абонентской сети.
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # Стандартный блок Типа 3 — разовые сделки
  block_one_time_t3: &block_one_time_t3
    - id: kpi_t3_connection
      kpi_ref: one_time_connection
      basis: единовременные начисления
      rate_formula: "0.05 * S"
      payment_condition: 100% оплата клиентом

    - id: kpi_t3_temp_works
      kpi_ref: one_time_temp_works
      basis: единовременные начисления
      rate_formula: "0.05 * S"
      payment_condition: 100% оплата клиентом
      distribution: может быть распределено на Проектную группу

    - id: kpi_t3_equipment_supply
      kpi_ref: one_time_equipment_supply
      basis: фактическая наценка
      rate_formula: "0.04 * S"
      payment_condition: 100% оплата клиентом
      distribution: может быть распределено на Проектную группу

    - id: kpi_t3_equipment_order
      kpi_ref: one_time_equipment_order
      basis: фактическая наценка
      rate_formula: "0.04 * S"
      payment_condition: 100% оплата клиентом
      distribution: может быть распределено на Проектную группу

    - id: kpi_t3_otv
      kpi_ref: one_time_otv
      basis: единовременные начисления
      rate_formula: "0.03 * S + 4000"
      payment_condition: 100% оплата клиентом
      distribution: может быть распределено на Проектную группу

    - id: kpi_t3_construction
      kpi_ref: one_time_construction
      basis: маржа (договорная цена минус плановые затраты на строительство и оборудование)
      rate_formula: "0.06 * S + 4000"
      payment_condition: 100% оплата клиентом
      distribution: может быть распределено на Проектную группу

    - id: kpi_t3_beautiful_number
      kpi_ref: one_time_beautiful_number
      basis: единовременные начисления
      rate_formula: "0.05 * S"
      payment_condition: 100% оплата клиентом


