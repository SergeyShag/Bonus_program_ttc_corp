# ============================================================
# ПРОГРАММА ПРЕМИРОВАНИЯ — B2B И ГСФ
# Версия: 1.0 (апрель 2026)
# Документ: СЛЗ 154168 от 31.03.2026
# ============================================================


# ============================================================
# СПРАВОЧНИК 1. ШКАЛЫ-КОРРЕКТОРЫ
# Применяются только к КПЭ Типа 1 (плановый блок)
# x — фактическое выполнение плана в долях (1.0 = 100%)
# ============================================================

scales:
  scale_1:
    description: Прирост регулярного дохода (новые продажи)
    thresholds:
      - { from: 0,    to: 0.65, coefficient: 0.0 }
      - { from: 0.65, to: 0.85, coefficient: 0.5 }
      - { from: 0.85, to: 1.00, coefficient: 0.8 }
      - { from: 1.00, to: 1.05, coefficient: 1.0 }
      - { from: 1.05, to: null, coefficient: 1.1 }

  scale_2:
    description: Выполнение плана по ежемесячным начислениям
    thresholds:
      - { from: 0,    to: 0.95, coefficient: 0.0 }
      - { from: 0.95, to: 1.00, coefficient: 0.8 }
      - { from: 1.00, to: 1.05, coefficient: 1.0 }
      - { from: 1.05, to: null, coefficient: 1.1 }

  scale_3:
    description: Оборачиваемость дебиторской задолженности (КО)
    note: >
      Для шкалы КО направление обратное: чем ниже КО, тем лучше.
      КО = сумма ДЗ / среднемесячные начисления.
    thresholds:
      - { from: 1.3,  to: null, coefficient: 0.0 }
      - { from: 1.1,  to: 1.3,  coefficient: 0.8 }
      - { from: 0.9,  to: 1.1,  coefficient: 1.0 }
      - { from: null, to: 0.9,  coefficient: 1.1 }

  scale_4:
    description: Поступившие оплаты (группа ДЗ)
    thresholds:
      - { from: 0,    to: 0.80, coefficient: 0.0 }
      - { from: 0.80, to: 1.00, coefficient: 0.8 }
      - { from: 1.00, to: 1.20, coefficient: 1.0 }
      - { from: 1.20, to: null, coefficient: 1.1 }


# ============================================================
# СПРАВОЧНИК 2. ПЕРЕЧНИ УСЛУГ
# ============================================================

service_lists:
  priority_services:
    description: Приоритетные услуги (повышенная ставка вознаграждения)
    items:
      - ВАТС (виртуальная АТС)
      - Wi-Fi для гостей
      - Видеомониторинг / Безопасный двор
      - IP-домофония

  standard_services:
    description: Основные услуги (все услуги связи, кроме приоритетных)
    items:
      - Интернет, VPN
      - Местная телефонная связь, SIP-телефония
      - SIP-trunk, Цифровые потоки Е1
      - Мобильная связь
      - Интерактивный мультимедийный сервис, Твой Выбор Бизнес
      - Предоставление в пользование цифровых каналов
      - Предоставление в пользование оптического кабеля
      - Предоставление в пользование кабельной канализации

  one_time_services:
    description: Основания для единовременного вознаграждения
    items:
      - Подключение к услугам фиксированной связи (в т.ч. с оборудованием)
      - Временные подключения, акты платных видов работ, сверхпостроечные работы
      - Реализация оборудования по договору поставки
      - Реализация оборудования по бланку заказа
      - Организация технической возможности (ОТВ)
      - Договор подряда на строительно-монтажные работы
      - Услуга «Выбор красивого номера»


# ============================================================
# СПРАВОЧНИК 3. ТИПЫ КПЭ
# ============================================================

kpi_types:
  type_1:
    name: Выполнение планового показателя
    basis: Оклад
    payout_formula: оклад × вес × коэффициент_шкалы
    note: Шкала-корректор обязательна

  type_2:
    name: Сдельная оплата от прироста регулярных начислений
    basis: Сумма прироста регулярных начислений по конкретной сделке
    payout_formula: ставка(S) × S
    note: >
      S — прирост регулярных начислений по конкретной сделке (не накопленным итогом).
      Ставка задаётся гиперболической формулой вида base_rate * K / (K + S),
      где K — точка перегиба (в рублях).
      Шкала-корректор используется как условие допуска: если выполнение плана
      ниже порогового значения шкалы (коэффициент = 0), сдельная по данному
      КПЭ не начисляется. При коэффициенте > 0 шкала на размер выплаты не влияет.

  type_3:
    name: Сдельная оплата за разовые сделки
    basis: Единовременные начисления / фактическая наценка / маржа
    payout_formula: ставка(S) × S
    note: >
      Шкала-корректор не применяется.
      Условие выплаты — 100% оплата соответствующих начислений клиентом.


# ============================================================
# КАРТОЧКИ ДОЛЖНОСТЕЙ
# ============================================================

positions:

  manager_development:
    name: Менеджер по развитию
    applies_to:
      - Ведущий менеджер по продажам
      - Менеджер по продажам крупному бизнесу
      - Менеджер по работе с корпоративными клиентами
      - Менеджер по продажам малому бизнесу
    note: >
      Единая система премирования для всей группы.
      Плановый блок (Тип 1) не применяется.
      КТУ (К4) временно выведен за рамки модели.

    kpi:

      # ----------------------------------------------------------
      # ТИП 2. Сдельная оплата от прироста регулярных начислений
      # ----------------------------------------------------------

      - id: kpi_t2_standard_existing
        name: >
          За прирост регулярных начислений от клиентов
          по всем услугам, кроме приоритетных
        type: type_2
        client_status: существующий
        services: standard_services
        rate_formula: "0.75 * 60000 / (60000 + S)"
        scale: scale_1
        scale_role: условие_допуска
        exclusions:
          - Услуги временного или срочного характера (срок 1–3 месяца)

      - id: kpi_t2_standard_new
        name: >
          За прирост регулярных начислений от клиентов
          по всем услугам, кроме приоритетных
        type: type_2
        client_status: новый
        services: standard_services
        rate_formula: "1.05 * 60000 / (60000 + S)"
        scale: scale_1
        scale_role: условие_допуска
        exclusions:
          - Услуги временного или срочного характера (срок 1–3 месяца)

      - id: kpi_t2_priority
        name: >
          За прирост регулярных начислений от существующих
          и новых клиентов по приоритетным услугам
        type: type_2
        client_status: новый и существующий
        services: priority_services
        rate_formula: "1.50 * 60000 / (60000 + S)"
        scale: scale_1
        scale_role: условие_допуска
        exclusions:
          - Услуги временного или срочного характера (срок 1–3 месяца)

      # ----------------------------------------------------------
      # ТИП 3. Сдельная оплата за разовые сделки
      # Общее условие: 100% оплата начислений клиентом
      # ----------------------------------------------------------

      - id: kpi_t3_connection
        name: За единовременные начисления от подключений к услугам фиксированной связи
        type: type_3
        basis: единовременные начисления
        rate_formula: "0.05 * S"
        payment_condition: 100% оплата клиентом

      - id: kpi_t3_temp_works
        name: >
          За единовременные начисления от временных подключений,
          актов платных видов работ, сверхпостроечных работ
        type: type_3
        basis: единовременные начисления
        rate_formula: "0.05 * S"
        payment_condition: 100% оплата клиентом
        distribution: может быть распределено на Проектную группу

      - id: kpi_t3_equipment_supply
        name: За единовременные начисления от реализации оборудования по договору поставки
        type: type_3
        basis: фактическая наценка
        rate_formula: "0.04 * S"
        payment_condition: 100% оплата клиентом
        distribution: может быть распределено на Проектную группу

      - id: kpi_t3_equipment_order
        name: За единовременные начисления от реализации оборудования по бланку заказа
        type: type_3
        basis: фактическая наценка
        rate_formula: "0.04 * S"
        payment_condition: 100% оплата клиентом
        distribution: может быть распределено на Проектную группу

      - id: kpi_t3_otv
        name: >
          За единовременные начисления от организации технической
          возможности предоставления доступа к услугам связи
        type: type_3
        basis: единовременные начисления
        rate_formula: "0.03 * S + 4000"
        payment_condition: 100% оплата клиентом
        distribution: может быть распределено на Проектную группу

      - id: kpi_t3_construction
        name: >
          За единовременные начисления от договора подряда
          на строительно-монтажные работы
          (переустройство, вынос, монтаж, установка, перенос)
        type: type_3
        basis: маржа (договорная цена минус плановые затраты на строительство и оборудование)
        rate_formula: "0.06 * S + 4000"
        payment_condition: 100% оплата клиентом
        distribution: может быть распределено на Проектную группу

      - id: kpi_t3_beautiful_number
        name: За единовременные начисления от услуги «Выбор красивого номера»
        type: type_3
        basis: единовременные начисления
        rate_formula: "0.05 * S"
        payment_condition: 100% оплата клиентом
