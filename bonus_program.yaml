# ============================================================
# СПРАВОЧНИК 5. МАППИНГ service_type → kpi_ref
# ============================================================
#
# Назначение: связать наименования услуг из биллинга (колонка
# service_type в deals.csv) с ключами КПЭ из kpi_catalog.
#
# Логика валидации в движке:
#   - kpi_type=type_2 → ожидаем delta_recurring != 0, one_time_amount == 0
#   - kpi_type=type_3 → ожидаем one_time_amount != 0, delta_recurring == 0
#
# Если service_type из deals.csv не найден в этом справочнике —
# движок падает с ошибкой «неизвестный тип услуги». Это намеренно:
# тихий пропуск сделок исказил бы расчёт премии.
#
# Различение standard / priority для kpi_type=type_2 делается
# по колонке service_category в deals.csv: при значении priority
# движок переопределяет kpi_ref с growth_standard на growth_priority.
# ============================================================

service_type_mappings:

  # ----- Тип 2: прирост регулярного дохода -----

  "Прирост регулярного дохода":
    kpi_ref: growth_standard
    kpi_type: type_2
    priority_override: growth_priority   # если service_category=priority

  # ----- Тип 3: разовые услуги -----

  "Подключение к услугам":
    kpi_ref: one_time_connection
    kpi_type: type_3

  "Временные подключения, акты платных видов работ, сверх построечные работы":
    kpi_ref: one_time_temp_works
    kpi_type: type_3

  "Реализация оборудования по договору поставки":
    kpi_ref: one_time_equipment_supply
    kpi_type: type_3

  "Реализация оборудования по бланку заказа":
    kpi_ref: one_time_equipment_order
    kpi_type: type_3

  "Организация технической возможности предоставления доступа к услугам связи":
    kpi_ref: one_time_otv
    kpi_type: type_3

  "Договор подряда на строительно-монтажные работы (переустройство, вынос, монтаж, установка, перенос)":
    kpi_ref: one_time_construction
    kpi_type: type_3

  "Услуга «Выбор красивого номера»":
    kpi_ref: one_time_beautiful_number
    kpi_type: type_3


# ============================================================
# СПРАВОЧНИК 6. ОБЩИЕ БЛОКИ КПЭ (якоря для повторного использования)
# ============================================================

kpi_blocks:

  # --- Полный сдельный блок Типа 2 (продажи: станд. + приоритет) ---
  # Ставки 70/150 — стандартный набор «продающих» должностей.
  block_t2_sales_70_150: &block_t2_sales_70_150
    - id: kpi_t2_standard
      kpi_ref: growth_standard
      services: standard_services
      rate: 0.70
      rate_formula: "0.70 * S"
      scale: scale_1
      scale_role: условие_допуска
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)
    - id: kpi_t2_priority
      kpi_ref: growth_priority
      services: priority_services
      rate: 1.50
      rate_formula: "1.50 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Сдельный блок Типа 2 для сопровождения 4К/развития 4К ---
  # Ставки 45/150.
  block_t2_sales_45_150: &block_t2_sales_45_150
    - id: kpi_t2_standard
      kpi_ref: growth_standard
      services: standard_services
      rate: 0.45
      rate_formula: "0.45 * S"
      scale: scale_1
      scale_role: условие_допуска
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)
    - id: kpi_t2_priority
      kpi_ref: growth_priority
      services: priority_services
      rate: 1.50
      rate_formula: "1.50 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Руководительский сдельный блок Типа 2 (символические ставки) ---
  # Только приоритетные услуги, ставка 10 %.
  block_t2_head_priority_10: &block_t2_head_priority_10
    - id: kpi_t2_priority
      kpi_ref: growth_priority
      services: priority_services
      rate: 0.10
      rate_formula: "0.10 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Руководительский сдельный блок Типа 2, ставка 7,5 % ---
  # Стандартные + приоритетные услуги, единая ставка 7,5 %.
  block_t2_head_75: &block_t2_head_75
    - id: kpi_t2_standard
      kpi_ref: growth_standard
      services: standard_services
      rate: 0.075
      rate_formula: "0.075 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)
    - id: kpi_t2_priority
      kpi_ref: growth_priority
      services: priority_services
      rate: 0.075
      rate_formula: "0.075 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Руководительский сдельный блок Типа 2, ставка 1,5 % ---
  # Стандартные + приоритетные услуги, единая ставка 1,5 %.
  block_t2_head_15: &block_t2_head_15
    - id: kpi_t2_standard
      kpi_ref: growth_standard
      services: standard_services
      rate: 0.015
      rate_formula: "0.015 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)
    - id: kpi_t2_priority
      kpi_ref: growth_priority
      services: priority_services
      rate: 0.015
      rate_formula: "0.015 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Канал ОТМ/ГРАС, ставка 15 % ---
  block_t2_otm_gras_15: &block_t2_otm_gras_15
    - id: kpi_t2_otm_gras
      kpi_ref: growth_otm_gras
      services: standard_services
      rate: 0.15
      rate_formula: "0.15 * S"
      scale: null
      scale_role: не применяется
      note: ОТМ — отдел телемаркетинга; ГРАС — группа развития абонентской сети.
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Канал ОТМ/ГРАС, ставка 30 % ---
  block_t2_otm_gras_30: &block_t2_otm_gras_30
    - id: kpi_t2_otm_gras
      kpi_ref: growth_otm_gras
      services: standard_services
      rate: 0.30
      rate_formula: "0.30 * S"
      scale: null
      scale_role: не применяется
      note: ОТМ — отдел телемаркетинга; ГРАС — группа развития абонентской сети.
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Канал «привлечено менеджером 3К/4К», ставка 15 % ---
  block_t2_mgr3k4k_15: &block_t2_mgr3k4k_15
    - id: kpi_t2_manager_3k_4k
      kpi_ref: growth_manager_3k_4k
      services: standard_services
      rate: 0.15
      rate_formula: "0.15 * S"
      scale: null
      scale_role: не применяется
      exclusions:
        - Услуги временного или срочного характера (срок 1–3 месяца)

  # --- Полный сдельный блок Типа 3 (продающие должности) ---
  # Ставки 5/5/4/4/4/8 + красивый номер 5 %.
  block_t3_full: &block_t3_full
    - id: kpi_t3_connection
      kpi_ref: one_time_connection
      basis: единовременные начисления
      rate_formula: "0.05 * S"
      payment_condition: 100% оплата клиентом
    - id: kpi_t3_temp_works
      kpi_ref: one_time_temp_works
      basis: единовременные начисления
      rate_formula: "0.05 * S"
      payment_condition: 100% оплата клиентом
      distribution: может быть распределено на Проектную группу
    - id: kpi_t3_equipment_supply
      kpi_ref: one_time_equipment_supply
      basis: фактическая наценка
